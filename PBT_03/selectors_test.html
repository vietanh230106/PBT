<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Selectors Test</title>

    <style>
        h1 {
            color: red;
        }

        .price {
            background: yellow;
        }

        #app header {
            border: 2px solid blue;
        }

        nav a:first-child {
            color: green;
        }

        .product.featured h2 {
            color: purple;
        }

        article > p {
            font-style: italic;
        }

        a[href="/"] {
            font-weight: bold;
        }

        .top-bar.dark h1 {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div id="app">
    <header class="top-bar dark">
        <h1>ShopTLU</h1>

        <nav>
            <a href="/" class="active">Home</a>
            <a href="/products">Products</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <main>
        <article class="product">
            <h2>iPhone 16</h2>
            <p class="price">25.990.000đ</p>
            <p>Mô tả sản phẩm...</p>
        </article>

        <article class="product featured">
            <h2>MacBook Pro</h2>
            <p class="price">45.990.000đ</p>
            <p>Mô tả sản phẩm...</p>
        </article>
    </main>
</div>

</body>
</html>
